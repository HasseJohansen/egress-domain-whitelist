version: '3.8'

services:
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: egress-config-server
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"  # HTTP port for development
    volumes:
      - ./config-server/data:/var/lib/config-server/data
      - ./config-server/certs:/var/lib/config-server/certs
      - ./ebpf/compiled:/var/lib/config-server/ebpf/compiled
    environment:
      - SERVER_PORT=8080
      - DATABASE_PATH=/var/lib/config-server/data/config-server.db
      - DEV_MODE=true
      - PASSWORD=development
      - SESSION_TIMEOUT=60
    networks:
      - egress-network
    command: [
      "--dev",
      "--port", "8080",
      "--password", "development",
      "--db", "/var/lib/config-server/data/config-server.db"
    ]

networks:
  egress-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
